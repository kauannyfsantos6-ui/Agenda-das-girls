<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agenda das Girls - Cadastro</title>
    <meta http-equiv="refresh" content="0; url=cadastro.html">
    <script>
        // Redireciona para cadastro se não houver usuário autenticado
        if (!localStorage.getItem('currentUser')) {
            if (window.location.pathname.indexOf('cadastro.html') === -1) {
                window.location.href = 'cadastro.html';
            }
        }
    </script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin: 80px auto;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #e91e63;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #e91e63;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #e91e63;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #d81b60;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Agenda das Girls</h1>
        <p>Crie sua conta</p>

        <form id="form-cadastro">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required>

            <label for="role">Você é</label>
            <select id="role" required>
                <option value="">Selecione</option>
                <option value="cliente">Cliente</option>
                <option value="cabeleireiro">Cabeleireiro(a)</option>
            </select>

            <div id="specialty-group" style="display:none">
                <label for="specialty">Especialidade (opcional)</label>
                <input type="text" id="specialty" placeholder="Ex: Corte, Coloração">
            </div>

            <button type="submit">Cadastrar</button>
        </form>

        <div class="footer">
            Já tem conta? <a href="login.html">Entrar</a><br>
            © 2026 - Agenda das Girls
        </div>
    </div>

    <script>
        function getUsers(){return JSON.parse(localStorage.getItem('users')||'[]')}
        function saveUser(u){const arr=getUsers();arr.push(u);localStorage.setItem('users',JSON.stringify(arr))}
        function setCurrentUser(u){localStorage.setItem('currentUser',JSON.stringify(u))}

        document.getElementById('role').addEventListener('change', function(){
            const g = document.getElementById('specialty-group');
            if(this.value === 'cabeleireiro') g.style.display = 'block'; else g.style.display = 'none';
        });

        document.getElementById('form-cadastro').addEventListener('submit', function(e){
            e.preventDefault();
            const name = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('senha').value;
            const role = document.getElementById('role').value;
            const specialty = document.getElementById('specialty').value.trim();
            if(!name||!email||!password||!role){ alert('Preencha todos os campos necessários.'); return; }
            const users = getUsers();
            if(users.find(u=>u.email===email)){ alert('Já existe uma conta com esse e-mail. Faça login.'); window.location.href='login.html'; return; }
            const user = { name, email, password, role, specialty };
            saveUser(user);
            setCurrentUser({ name, email, role });
            alert('Cadastro realizado com sucesso! Você foi autenticado.');
            window.location.href = 'agenda.html';
        });
    </script>

</body>
</html>
